<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTPORT // TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --accent: rgb(88, 166, 255);
            --text: #c9d1d9;
            --border: rgba(88, 166, 255, 0.4);
            --card-bg: rgba(13, 17, 23, 0.94);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            transition: background-color 2.5s ease; 
        }

        #plexus-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        section {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 70px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--accent); 
            margin-bottom: 25px;
            display: inline-block;
            overflow: hidden;
            background: #000;
            transition: border-color 2.0s ease, box-shadow 2.0s ease;
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; }

        .content-box {
            max-width: 900px;
            width: 100%;
            background: rgba(13, 17, 23, 0.9);
            border-left: 5px solid var(--accent);
            padding: 40px;
            border-radius: 0 8px 8px 0;
            transition: border-color 2.0s ease;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 4px;
        }
        .contact-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .item-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .writeup-btn { border: 2px solid var(--accent) !important; padding: 25px; }
        .writeup-btn:hover { box-shadow: 0 0 20px var(--accent); transform: scale(1.02); }

        .tag {
            font-size: 0.75em;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .socials { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .socials a { color: var(--text); font-size: 2.3em; transition: color 2s ease; }

        .scroll-reminder {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 0.8em;
            letter-spacing: 2px;
            color: var(--accent);
            opacity: 0.7;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            transition: color 2s ease;
        }
        .scroll-reminder i { animation: bounce 2s infinite; margin-top: 8px; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-8px);} 60% {transform: translateY(-4px);} }
        .cursor::after { content: '_'; animation: blink 1s infinite; color: var(--accent); }
        @keyframes blink { 50% { opacity: 0; } }
        .writeup-btn:hover {
    box-shadow: 0 0 20px var(--accent);
    border-color: #fff;
    transform: translateY(-2px);
}
    </style>
</head>
<body>

    <canvas id="plexus-canvas"></canvas>

    <div class="scroll-reminder">
        <span>SCROLL_DOWN</span>
        <i class="fas fa-chevron-down"></i>
    </div>

    <section id="hero">
        <div class="profile-card">
            <div class="profile-img"><img src="pfp.png" alt="GHOSTPORT PFP"></div>
            <h1 id="t-logo"></h1>
            <div id="t-sub" style="margin: 10px 0; min-height: 1.2em;"></div>
            <div id="thm-stats" style="margin-top: 20px; padding: 10px; border: 1px dashed var(--accent); border-radius: 4px; background: rgba(88, 166, 255, 0.05);">
    <span class="tag" style="margin-bottom: 5px;">[ SYSTEM_RANK ]</span>
    <div id="thm-rank" style="font-size: 1.2em; font-weight: bold; color: #fff;">LOADING...</div>
    <div id="thm-percent" style="font-size: 0.8em; color: var(--accent); margin-top: 5px; opacity: 0.8;">CONNECTING_TO_API...</div>
</div>
            <div id="social-bar" class="socials" style="opacity:0; transition: opacity 1s;">
                <a href="https://www.tiktok.com/@bigtoe123456" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://github.com/umairashik123" target="_blank"><i class="fab fa-github"></i></a>
            </div>
            <a href="mailto:umairashik123@gmail.com" class="contact-btn" id="contact-trigger" style="opacity:0; transition: opacity 1.5s;">ESTABLISH_CONNECTION</a>
        </div>
    </section>

    <section id="about">
        <div class="content-box">
            <h2 id="about-title" style="margin-top: 0; margin-bottom: 20px;"></h2>
            <div id="about-typing" style="line-height: 1.8; font-size: 1.1em;"></div>
        </div>
    </section>

    <section id="skills">
        <div class="content-box">
            <h2 id="skills-title"></h2>
            <div class="grid-layout">
                <div class="item-card"><span class="tag">CORE</span>Cybersecurity Fundamentals</div>
                <div class="item-card"><span class="tag">OFFENSIVE</span>Active Directory,Web & Malware</div>
                <div class="item-card"><span class="tag">DEV</span>Python & C++</div>
                <div class="item-card"><span class="tag">SHELL</span>Bash Scripting</div>
            </div>
        </div>
    </section>

    <section id="writeups">
        <div class="content-box">
            <h2 id="thm-title"></h2>
            <div class="grid-layout">
                <a href="https://medium.com/@umairashik123/cracking-cupids-vault-a-ctf-walkthrough-11c00cf290e1" target="_blank" class="item-card writeup-btn">
                    <span class="tag">[ RUN: CUPID_VAULT ]</span>
                    <strong>Hidden Deep Into My Heart</strong>
                </a>
                <a href="https://medium.com/@umairashik123/tryhackme-compiled-write-up-12f7884662f4" target="_blank" class="item-card writeup-btn">
                    <span class="tag">[ RUN: COMPILED ]</span>
                    <strong>Compiled Write-Up</strong>
                </a>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('plexus-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 200 };
        let currentRGB = { r: 88, g: 166, b: 255 }; 
        let typedStates = { aboutTitle: false, aboutBody: false, skills: false, thm: false };

        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('touchstart', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = this.x; this.baseY = this.y;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.char = Math.random() > 0.5 ? "1" : "0";
                this.density = (Math.random() * 20) + 1;
            }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < mouse.radius) {
                    let force = (mouse.radius - dist) / mouse.radius;
                    this.x += (dx / dist) * force * this.density;
                    this.y += (dy / dist) * force * this.density;
                } else {
                    this.x -= (this.x - this.baseX) / 20;
                    this.y -= (this.y - this.baseY) / 20;
                }
                this.x += this.speedX; this.y += this.speedY;
                this.baseX += this.speedX; this.baseY += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgb(${currentRGB.r}, ${currentRGB.g}, ${currentRGB.b})`;
                ctx.font = "bold 14px monospace"; 
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        function init() {
            particles = [];
            let count = (canvas.width * canvas.height) / 8000; 
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 210) { // REACH: Balanced
                        ctx.strokeStyle = `rgba(${currentRGB.r}, ${currentRGB.g}, ${currentRGB.b}, ${0.7 - d/210})`;
                        ctx.lineWidth = 1.5; // THICKNESS: Medium
                        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        async function typeEffect(element, text, speed = 40) {
            element.classList.add('cursor');
            for (let char of text) { element.innerHTML += char; await new Promise(r => setTimeout(r, speed)); }
            element.classList.remove('cursor');
        }

        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            const h = window.innerHeight;
            
            const states = [
                { pos: 0, rgb: {r: 88, g: 166, b: 255}, bg: "#05070a" },
                { pos: h, rgb: {r: 170, g: 170, b: 170}, bg: "#020408" },
                { pos: h*2, rgb: {r: 0, g: 255, b: 127}, bg: "#020805" },
                { pos: h*3, rgb: {r: 155, g: 89, b: 182}, bg: "#07050a" }
            ];

            let s1 = states[0], s2 = states[1];
            if (y > h && y <= h*2) { s1 = states[1]; s2 = states[2]; }
            else if (y > h*2) { s1 = states[2]; s2 = states[3]; }

            let factor = Math.max(0, Math.min(1, (y - s1.pos) / h));
            currentRGB.r = Math.round(s1.rgb.r + (s2.rgb.r - s1.rgb.r) * factor);
            currentRGB.g = Math.round(s1.rgb.g + (s2.rgb.g - s1.rgb.g) * factor);
            currentRGB.b = Math.round(s1.rgb.b + (s2.rgb.b - s1.rgb.b) * factor);

            document.documentElement.style.setProperty('--accent', `rgb(${currentRGB.r}, ${currentRGB.g}, ${currentRGB.b})`);
            document.body.style.backgroundColor = (factor > 0.5) ? s2.bg : s1.bg;

            if (y > h*0.2 && !typedStates.aboutTitle) { 
                typedStates.aboutTitle = true; 
                typeEffect(document.getElementById('about-title'), "ABOUT_ME", 60).then(() => {
                    typedStates.aboutBody = true;
                    typeEffect(document.getElementById('about-typing'), "I am a motivated 14-year-old student with an intermediate-level understanding of cybersecurity and computer science, which I have been studying since the age of 8. I hold the CompTIA Security+ certification and regularly participate in Capture The Flag (CTF) competitions to develop practical problem-solving and security skills in a legal and ethical environment.", 20);
                });
            }
            if (y > h*1.3 && !typedStates.skills) { typedStates.skills = true; typeEffect(document.getElementById('skills-title'), "TECHNICAL_SKILLS", 60); }
            if (y > h*2.3 && !typedStates.thm) { typedStates.thm = true; typeEffect(document.getElementById('thm-title'), "THM_ROOM_WRITEUPS", 60); }
            
            const reminder = document.querySelector('.scroll-reminder');
            reminder.style.opacity = (y > h*2.8) ? "0" : "0.7";
        });

      window.onload = async () => {
            resize(); animate();
            await typeEffect(document.getElementById('t-logo'), 'GHOSTPORT', 60);
            await typeEffect(document.getElementById('t-sub'), 'PENTESTER / SECURITY RESEARCHER/STUDENT', 60);
            document.getElementById('social-bar').style.opacity = "1";
            document.getElementById('contact-trigger').style.opacity = "1";
            fetchTHMStats(); // Starts the live rank tracker
            loadMediumLinks(); // Starts the writeup loader
        };

        window.onresize = resize;

        async function fetchTHMStats() {
            const username = 'ghostport'; 
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://tryhackme.com/api/v2/user/all-stats/${username}`)}`);
                const data = await response.json();
                const stats = JSON.parse(data.contents);

                if (stats && stats.rank) {
                    document.getElementById('thm-rank').innerText = `RANK: #${stats.rank.toLocaleString()}`;
                    document.getElementById('thm-percent').innerText = `TOP: ${stats.percentile}% OF USERS`;
                }
            } catch (error) {
                document.getElementById('thm-rank').innerText = "OFFLINE";
                document.getElementById('thm-percent').innerText = "COULD_NOT_SYNC_STATS";
            }
        }

        async function loadMediumLinks() {
            const container = document.querySelector('#writeups .grid-layout');
            const response = await fetch('https://api.github.com/repos/umairballs/portofolio/contents/writeups');
            const files = await response.json();

            for (const file of files) {
                if (file.name.endsWith('.md')) {
                    const raw = await fetch(file.download_url);
                    const content = await raw.text();
                    
                    const title = content.match(/title: (.*)/)?.[1] || "UNTITLED";
                    const url = content.match(/medium_url: (.*)/)?.[1] || "#";
                    const desc = content.match(/description: (.*)/)?.[1] || "";

                    const cleanTitle = title.replace(/['"]+/g, '').toUpperCase();
                    const cleanDesc = desc.replace(/['"]+/g, '');

                    const box = `
                        <a href="${url}" target="_blank" class="item-card writeup-btn" style="text-decoration: none; display: flex; flex-direction: column; justify-content: center; min-height: 110px;">
                            <span class="tag">[ RUN: ${cleanTitle} ]</span>
                            <strong style="display: block; color: #ffffff; font-family: 'Courier New', Courier, monospace; font-size: 17px; font-weight: 800; line-height: 1.3; margin: 0;">
                                ${cleanDesc}
                            </strong>
                        </a>
                    `;
                    container.innerHTML += box;
                }
            }
        }
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
